<footer class="footer">
  <div class="container footer__inner" appAnimateOnScroll animationClass="fade-up">
    
    <!-- Top: Brand & Socials -->
    <div class="footer__top">
      <div class="footer__brand" (click)="goHome()">
        <img src="assets/logo/logo_grau.png" [attr.alt]="'footer.logoAlt' | t" class="footer__logo">
      </div>

      <div class="footer__socials">
        <a href="https://github.com/milosdimi" target="_blank" rel="noopener noreferrer" class="social-link" aria-label="GitHub">
          <img src="assets/icons/Github.svg" alt="">
        </a>
        <a href="mailto:dm@dimit.cc" class="social-link" aria-label="Email">
          <img src="assets/icons/mail.svg" alt="">
        </a>
        <a href="https://www.linkedin.com/in/milos-dimitrijevic-35a552195" target="_blank" rel="noopener noreferrer" class="social-link" aria-label="LinkedIn">
          <img src="assets/icons/linkedin.svg" alt="">
        </a>
      </div>
    </div>

    <!-- Middle: Info -->
    <div class="footer__info">
      <p class="footer__role">{{ 'footer.role' | t }}</p>
      <p class="footer__location">{{ 'footer.location' | t }}</p>
    </div>

    <!-- Bottom: Legal & Copyright -->
    <div class="footer__bottom">
      <div class="footer__legal">
        <a routerLink="/impressum" class="legal-link">{{ 'footer.legal' | t }}</a>
        <a routerLink="/datenschutz" class="legal-link">{{ 'footer.privacy' | t }}</a>
      </div>
      <p class="footer__copyright">© {{ year }} {{ 'footer.copyright' | t }}</p>
    </div>

  </div>
</footer>
